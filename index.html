<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTFOLIO</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            margin: 0;
            padding: 0;
        }
        header {
            background-color: #161b22;
            padding: 40px;
            text-align: center;
            border-bottom: 1px solid #30363d;
        }
        h1 { color: #58a6ff; margin: 0; font-size: 32px; }
        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            padding: 50px 20px;
        }
        .card {
            background-color: #161b22;
            border: 1px solid #30363d;
            border-radius: 15px;
            width: 320px;
            padding: 25px;
            text-align: center;
            transition: 0.3s;
        }
        .card:hover { 
            border-color: #58a6ff; 
            transform: translateY(-8px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            background-color: #0d1117;
            margin-bottom: 20px;
        }
        h3 { margin: 10px 0; font-size: 24px; color: #f0f6fc; }
        .btn {
            display: block;
            background-color: #1f6feb;
            color: white;
            padding: 12px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 20px;
        }
        .btn:hover { background-color: #388bfd; }
    </style>
</head>
<body>

    <header>
        <h1>SHOWCASE</h1>
    </header>

    <div class="container">
        <div class="card">
            <img src="https://via.placeholder.com/320x180/161b22/58a6ff?text=SITE+1" alt="سایت ۱">
            <h3>سایت ۱</h3>
            <a href="https://t.me/MRAMIR247" class="btn">سفارش</a>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/320x180/161b22/58a6ff?text=SITE+2" alt="سایت ۲">
            <h3>سایت ۲</h3>
            <a href="https://t.me/MRAMIR247" class="btn">سفارش</a>
        </div>

        <div class="card">
            <img src="https://via.placeholder.com/320x180/161b22/58a6ff?text=SITE+3" alt="سایت ۳">
            <h3>سایت ۳</h3>
            <a href="https://t.me/MRAMIR247" class="btn">سفارش</a>
        </div>
    </div>

</body>
</html>
